global:
  imageRegistry: ""
  imagePullSecrets: []

# -- Ingress class name (haproxy)
ingressClassName: haproxy

# -- TLS configuration via cert-manager
tls:
  enabled: true
  clusterIssuer: letsencrypt-prod

# =============================================================================
# Backend API
# =============================================================================
backend:
  replicaCount: 1
  image:
    repository: eu-jap-hack/backend
    tag: latest
    pullPolicy: IfNotPresent
  service:
    port: 8000
  ingress:
    host: ""  # e.g. api.example.com
  env:
    DATABASE_URL: ""  # e.g. postgresql://user:pass@host:5432/db
    ENABLE_EDC: "true"
    AUTH_ENABLED: "false"
    GAIAX_DID_DOMAIN: ""
    GAIAX_DID_PATH: ""
    EDC_BASE_URL: ""
    EDC_API_KEY: ""
    BPN_NUMBER: ""
    APP_BASE_URL: ""
    EDC_ACCESS_POLICY_ID: ""
    EDC_CONTRACT_POLICY_ID: ""
    EDC_CONSUMER_MANAGEMENT_URL: ""
    EDC_CONSUMER_API_KEY: ""
    EDC_PARTNER_BPN: ""
    EDC_PARTNER_DSP_URL: ""
    EDC_NEGOTIATION_INITIAL_DELAY_MS: "5000"
    EDC_NEGOTIATION_POLL_INTERVAL_MS: "5000"
    EDC_NEGOTIATION_MAX_RETRIES: "3"
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

# =============================================================================
# Frontend Portals (all share the same structure)
# =============================================================================
portalDataspace:
  replicaCount: 1
  image:
    repository: eu-jap-hack/portal-dataspace
    tag: latest
    pullPolicy: IfNotPresent
  service:
    port: 80
  ingress:
    host: ""  # e.g. dataspace.example.com
  env:
    VITE_KEYCLOAK_URL: ""
    VITE_KEYCLOAK_REALM: "eu-jap-hack"
    VITE_API_BASE_URL: ""
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 128Mi

