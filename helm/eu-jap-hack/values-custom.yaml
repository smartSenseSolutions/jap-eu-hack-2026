# =============================================================================
# Keycloak Identity Provider
# =============================================================================
keycloak:
  enabled: true
  replicaCount: 1
  image:
    repository: eu-jap-hack/keycloak
    tag: "1.0.9"
    pullPolicy: Always
  adminUsername: admin
  adminPassword: "<path:k8s-stack/data/jap-eu-hack#keycloakAdminPassword>"
  db:
    url: "jdbc:postgresql://<path:k8s-stack/data/jap-eu-hack#dbhost>:5432/jap_eu_hack"
    username: "<path:k8s-stack/data/jap-eu-hack#dbuser>"
    password: "<path:k8s-stack/data/jap-eu-hack#dbpass>"
  service:
    port: 8080
  ingress:
    host: "auth.tx.the-sense.io"
  resources:
    requests:
      cpu: 500m
      memory: 512Mi
    limits:
      cpu: 1000m
      memory: 1Gi

