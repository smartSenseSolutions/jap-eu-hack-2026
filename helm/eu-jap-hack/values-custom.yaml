global:
  imageRegistry: "public.ecr.aws/smartsensesolutions"
  imagePullSecrets: []

# -- Ingress class name
ingressClassName: nginx

# -- TLS configuration via cert-manager
tls:
  enabled: true
  clusterIssuer: letsencrypt-prod

# =============================================================================
# Backend API
# =============================================================================
backend:
  replicaCount: 1
  image:
    repository: eu-jap-hack/backend
    tag: "1.0.8"
    pullPolicy: Always
  service:
    port: 8000
  ingress:
    host: "jeh-api.tx.the-sense.io"
  env:
    DATABASE_URL: "postgresql://<path:k8s-stack/data/jap-eu-hack#dbuser>:<path:k8s-stack/data/jap-eu-hack#dbpass>@<path:k8s-stack/data/jap-eu-hack#dbhost>:5432/<path:k8s-stack/data/jap-eu-hack#dbname>"
    ENABLE_EDC: "true"
    AUTH_ENABLED: "false"
    KEYCLOAK_URL: "https://auth.tx.the-sense.io"
    KEYCLOAK_REALM: "eu-jap-hack"
    GAIAX_DID_DOMAIN: "jeh-api.tx.the-sense.io"
    GAIAX_DID_PATH: "v7"
    EDC_BASE_URL: "https://tata-motors-controlplane.tx.the-sense.io"
    EDC_API_KEY: "tata-motors"
    BPN_NUMBER: "BPNL00000000024R"
    APP_BASE_URL: "https://jeh-api.tx.the-sense.io"
    EDC_ACCESS_POLICY_ID: "policy_2"
    EDC_CONTRACT_POLICY_ID: "policy_2"
    EDC_CONSUMER_MANAGEMENT_URL: "https://nissan-motors-controlplane.tx.the-sense.io/management"
    EDC_CONSUMER_API_KEY: "nissan-motors"
    EDC_NEGOTIATION_INITIAL_DELAY_MS: "5000"
    EDC_NEGOTIATION_POLL_INTERVAL_MS: "5000"
    EDC_NEGOTIATION_MAX_RETRIES: "3"
    CADDE_ASSET_ID: "asset_7"
    CADDE_PARTNER_EDC_DSP_URL: "https://tata-motors-protocol.tx.the-sense.io/api/v1/dsp"
    CADDE_PARTNER_EDC_BPN: "BPNL00000000024R"
    WALTID_ISSUER_URL: "http://eu-jap-hack-waltid-issuer:7002"
    WALTID_WALLET_URL: "http://eu-jap-hack-waltid-wallet:7001"
    WALTID_VERIFIER_URL: "http://eu-jap-hack-waltid-verifier:7003"
  resources:
    requests:
      cpu: 10m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

# =============================================================================
# Frontend Portals
# =============================================================================
portalDataspace:
  replicaCount: 1
  image:
    repository: eu-jap-hack/portal-dataspace
    tag: "1.0.8"
    pullPolicy: Always
  service:
    port: 80
  ingress:
    host: "jeh-dataspace.tx.the-sense.io"
  env:
    VITE_KEYCLOAK_URL: "https://auth.tx.the-sense.io"
    VITE_KEYCLOAK_REALM: "eu-jap-hack"
    VITE_API_BASE_URL: "https://jeh-api.tx.the-sense.io/api"
    VITE_PORTAL_COMPANY_URL: "https://jeh-company.tx.the-sense.io"
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 128Mi

