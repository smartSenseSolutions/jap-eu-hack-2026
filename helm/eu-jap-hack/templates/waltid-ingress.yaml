{{- if .Values.waltidWalletApi.ingress.host }}
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "eu-jap-hack.fullname" . }}-waltid-wallet
  labels:
    {{- include "eu-jap-hack.labels" . | nindent 4 }}
    app.kubernetes.io/component: waltid-wallet-api
  annotations:
    haproxy.org/server-ssl: "false"
    {{- if .Values.tls.enabled }}
    cert-manager.io/cluster-issuer: {{ .Values.tls.clusterIssuer | quote }}
    haproxy.org/ssl-redirect: "true"
    {{- end }}
spec:
  ingressClassName: {{ .Values.ingressClassName }}
  {{- if .Values.tls.enabled }}
  tls:
    - hosts:
        - {{ .Values.waltidWalletApi.ingress.host }}
      secretName: {{ include "eu-jap-hack.fullname" . }}-waltid-wallet-tls
  {{- end }}
  rules:
    - host: {{ .Values.waltidWalletApi.ingress.host }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ include "eu-jap-hack.fullname" . }}-waltid-wallet
                port:
                  number: {{ .Values.waltidWalletApi.service.port }}
{{- end }}
