{{- if .Values.keycloak.enabled }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "eu-jap-hack.fullname" . }}-keycloak-secret
  labels:
    {{- include "eu-jap-hack.labels" . | nindent 4 }}
    app.kubernetes.io/component: keycloak
type: Opaque
stringData:
  KC_BOOTSTRAP_ADMIN_USERNAME: {{ .Values.keycloak.adminUsername | quote }}
  KC_BOOTSTRAP_ADMIN_PASSWORD: {{ .Values.keycloak.adminPassword | quote }}
  KC_DB_USERNAME: {{ .Values.keycloak.db.username | quote }}
  KC_DB_PASSWORD: {{ .Values.keycloak.db.password | quote }}
{{- end }}
