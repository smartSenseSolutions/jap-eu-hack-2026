{{- if .Values.keycloak.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "eu-jap-hack.fullname" . }}-keycloak
  labels:
    {{- include "eu-jap-hack.labels" . | nindent 4 }}
    app.kubernetes.io/component: keycloak
spec:
  replicas: {{ .Values.keycloak.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: keycloak
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: keycloak
        app.kubernetes.io/instance: {{ .Release.Name }}
        app.kubernetes.io/component: keycloak
    spec:
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: keycloak
          image: {{ include "eu-jap-hack.image" (dict "global" .Values.global "image" .Values.keycloak.image) }}
          imagePullPolicy: {{ .Values.keycloak.image.pullPolicy }}
          ports:
            - containerPort: 8080
              protocol: TCP
              name: http
            - containerPort: 9000
              protocol: TCP
              name: management
          env:
            - name: KC_HTTP_ENABLED
              value: "true"
            - name: KC_PROXY_HEADERS
              value: "xforwarded"
            - name: KC_HOSTNAME
              value: {{ .Values.keycloak.ingress.host | quote }}
            - name: KC_HOSTNAME_STRICT
              value: "false"
            - name: KC_DB_URL
              value: {{ .Values.keycloak.db.url | quote }}
          envFrom:
            - secretRef:
                name: {{ include "eu-jap-hack.fullname" . }}-keycloak-secret
          livenessProbe:
            httpGet:
              path: /health/live
              port: 9000
            initialDelaySeconds: 60
            periodSeconds: 15
            failureThreshold: 5
          readinessProbe:
            httpGet:
              path: /health/ready
              port: 9000
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 5
          resources:
            {{- toYaml .Values.keycloak.resources | nindent 12 }}
{{- end }}
