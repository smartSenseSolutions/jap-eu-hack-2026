apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "eu-jap-hack.fullname" . }}-waltid-wallet
  labels:
    {{- include "eu-jap-hack.labels" . | nindent 4 }}
    app.kubernetes.io/component: waltid-wallet-api
data:
  db.conf: |
    {
      "dataSource": {
        "jdbcUrl": "jdbc:sqlite:/waltid-wallet-api/data/wallet.db",
        "driverClassName": "org.sqlite.JDBC",
        "maximumPoolSize": 5,
        "autoCommit": true,
        "transactionIsolation": "TRANSACTION_SERIALIZABLE"
      },
      "recreateDatabaseOnStart": false
    }
  auth.conf: |
    {
      "encryptionKey": "A3kB7mZ9pQ2wR4xY",
      "signKey": "A3kB7mZ9pQ2wR4xY",
      "tokenKey": "A3kB7mZ9pQ2wR4xY",
      "issTokenClaim": "sub",
      "tokenLifetime": "PT24H"
    }
  web.conf: |
    {
      "webHost": "0.0.0.0",
      "webPort": 7001
    }
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "eu-jap-hack.fullname" . }}-waltid-issuer
  labels:
    {{- include "eu-jap-hack.labels" . | nindent 4 }}
    app.kubernetes.io/component: waltid-issuer-api
data:
  issuer-service.conf: |
    {
      "baseUrl": "http://{{ include "eu-jap-hack.fullname" . }}-waltid-issuer:7002"
    }
  web.conf: |
    {
      "webHost": "0.0.0.0",
      "webPort": 7002
    }
  credential-issuer-metadata.conf: |
    {
      "credential_issuer": "http://{{ include "eu-jap-hack.fullname" . }}-waltid-issuer:7002",
      "credential_endpoint": "http://{{ include "eu-jap-hack.fullname" . }}-waltid-issuer:7002/openid4vc/jwt/issue",
      "credential_configurations_supported": {
        "LegalParticipant_jwt_vc_json": {
          "format": "jwt_vc_json",
          "cryptographic_binding_methods_supported": ["did:web", "did:key", "did:jwk"],
          "credential_signing_alg_values_supported": ["RS256", "ES256", "EdDSA"],
          "credential_definition": {
            "type": ["VerifiableCredential", "LegalParticipant"],
            "credentialSubject": {
              "legalName": { "mandatory": true, "display": [{ "name": "Legal Name" }] },
              "legalRegistrationNumber": { "mandatory": true, "display": [{ "name": "Registration Number" }] },
              "legalAddress": { "mandatory": true, "display": [{ "name": "Legal Address" }] },
              "headquartersAddress": { "mandatory": false, "display": [{ "name": "HQ Address" }] }
            }
          },
          "display": [{ "name": "Gaia-X Legal Participant Credential" }]
        },
        "OrgVC_jwt_vc_json": {
          "format": "jwt_vc_json",
          "cryptographic_binding_methods_supported": ["did:web", "did:key", "did:jwk"],
          "credential_signing_alg_values_supported": ["RS256", "ES256", "EdDSA"],
          "credential_definition": { "type": ["VerifiableCredential", "OrgVC"] },
          "display": [{ "name": "Organization Credential" }]
        },
        "OwnershipVC_jwt_vc_json": {
          "format": "jwt_vc_json",
          "cryptographic_binding_methods_supported": ["did:web", "did:key", "did:jwk"],
          "credential_signing_alg_values_supported": ["RS256", "ES256", "EdDSA"],
          "credential_definition": { "type": ["VerifiableCredential", "OwnershipVC"] },
          "display": [{ "name": "Vehicle Ownership Credential" }]
        },
        "InsuranceVC_jwt_vc_json": {
          "format": "jwt_vc_json",
          "cryptographic_binding_methods_supported": ["did:web", "did:key", "did:jwk"],
          "credential_signing_alg_values_supported": ["RS256", "ES256", "EdDSA"],
          "credential_definition": { "type": ["VerifiableCredential", "InsuranceVC"] },
          "display": [{ "name": "Insurance Credential" }]
        },
        "OpenBadgeCredential_jwt_vc_json": {
          "format": "jwt_vc_json",
          "cryptographic_binding_methods_supported": ["did:web", "did:key", "did:jwk"],
          "credential_signing_alg_values_supported": ["ES256", "EdDSA"],
          "credential_definition": { "type": ["VerifiableCredential", "OpenBadgeCredential"] },
          "display": [{ "name": "Open Badge Credential" }]
        }
      }
    }
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "eu-jap-hack.fullname" . }}-waltid-verifier
  labels:
    {{- include "eu-jap-hack.labels" . | nindent 4 }}
    app.kubernetes.io/component: waltid-verifier-api
data:
  verifier-service.conf: |
    {
      "baseUrl": "http://{{ include "eu-jap-hack.fullname" . }}-waltid-verifier:7003",
      "verifierUiUrl": "http://{{ include "eu-jap-hack.fullname" . }}-waltid-verifier:7003"
    }
  web.conf: |
    {
      "webHost": "0.0.0.0",
      "webPort": 7003
    }
